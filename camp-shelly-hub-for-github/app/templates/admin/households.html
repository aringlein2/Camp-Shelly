{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between">
  <h1 class="text-2xl font-semibold">Households</h1>
  <a href="{{ url_for('admin.household_new') }}" class="bg-emerald-700 text-white px-3 py-2 rounded text-sm">+ New household</a>
</div>

<div class="mt-4 grid gap-2">
  {% for h in items %}
    <div class="bg-white rounded shadow p-3 flex items-center justify-between">
      <div>
        <div class="font-medium">{{ h['household_name'] }}</div>
        <div class="text-xs text-stone-500">{{ h['member_count'] }} member{{ '' if h['member_count'] == 1 else 's' }}</div>
        {% if h['notes'] %}<div class="text-xs text-stone-600 mt-1">{{ h['notes'] }}</div>{% endif %}
      </div>
      <div class="text-xs flex gap-2">
        <a href="{{ url_for('admin.household_edit', item_id=h['id']) }}" class="underline">Edit</a>
        <form method="post" action="{{ url_for('admin.household_delete', item_id=h['id']) }}" onsubmit="return confirm('Delete this household?');">
          <button class="underline text-red-700">Delete</button>
        </form>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
