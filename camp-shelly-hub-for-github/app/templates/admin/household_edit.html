{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit household{% else %}New household{% endif %}</h1>
<form method="post" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Household name *</span>
    <input name="household_name" required value="{{ item['household_name'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Notes</span>
    <textarea name="notes" rows="2" class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['notes'] if item else '' }}</textarea>
  </label>
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('admin.households') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
