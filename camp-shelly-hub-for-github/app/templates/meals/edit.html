{% extends "base.html" %}
{% from "partials/_photo_field.html" import photo_field %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit meal idea{% else %}New meal idea{% endif %}</h1>
<form method="post" enctype="multipart/form-data" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Meal name *</span>
    <input name="title" required value="{{ item['title'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Meal type *</span>
    <select name="meal_type" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      <option value=""></option>
      {% for m in meal_types %}<option value="{{ m }}" {% if item and item['meal_type'] == m %}selected{% endif %}>{{ m }}</option>{% endfor %}
    </select>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Serves how many?</span>
    <input name="serves" value="{{ item['serves'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Description</span>
    <textarea name="description" rows="3" class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['description'] if item else '' }}</textarea>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Prep-ahead notes</span>
    <textarea name="prep_ahead_notes" rows="2" class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['prep_ahead_notes'] if item else '' }}</textarea>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Camp cooking instructions</span>
    <textarea name="cooking_instructions" rows="3" class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['cooking_instructions'] if item else '' }}</textarea>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Equipment needed</span>
    <input name="equipment_needed" value="{{ item['equipment_needed'] if item else '' }}"
           placeholder="e.g. dutch oven, 2 pots, foil"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <fieldset>
    <legend class="text-sm font-medium">Dietary</legend>
    <div class="mt-1 flex flex-wrap gap-2">
      {% for d in dietary_tags %}
        <label class="inline-flex items-center gap-1 px-2 py-1 border border-stone-300 rounded text-sm bg-white">
          <input type="checkbox" name="dietary" value="{{ d }}" {% if d in selected_diets %}checked{% endif %}>
          {{ d }}
        </label>
      {% endfor %}
    </div>
  </fieldset>
  <label class="block">
    <span class="text-sm font-medium">Cleanup level</span>
    <select name="cleanup_level" class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      <option value=""></option>
      {% for c in cleanup_levels %}<option value="{{ c }}" {% if item and item['cleanup_level'] == c %}selected{% endif %}>{{ c }}</option>{% endfor %}
    </select>
  </label>
  {{ photo_field(item['image_path'] if item else None) }}
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('meals.index') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
