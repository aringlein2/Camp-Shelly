{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit{% else %}New{% endif %} Announcement</h1>
<form method="post" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Title *</span>
    <input name="title" required value="{{ item['title'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Body *</span>
    <textarea name="body" rows="6" required
              class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['body'] if item else '' }}</textarea>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Priority</span>
    <select name="priority" class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      {% for p in priorities %}
        <option value="{{ p }}" {% if item and item['priority'] == p %}selected{% endif %}>{{ p|capitalize }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="inline-flex items-center gap-2">
    <input type="checkbox" name="pinned" {% if item and item['pinned'] %}checked{% endif %}>
    <span class="text-sm">Pin to top &amp; show on homepage</span>
  </label>
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('announcements.index') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
