{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit FAQ item{% else %}New FAQ item{% endif %}</h1>
<form method="post" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Category *</span>
    <select name="category" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      <option value=""></option>
      {% for c in categories %}<option value="{{ c }}" {% if item and item['category'] == c %}selected{% endif %}>{{ c }}</option>{% endfor %}
    </select>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Question *</span>
    <input name="question" required value="{{ item['question'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Answer *</span>
    <textarea name="answer" rows="5" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['answer'] if item else '' }}</textarea>
  </label>
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('faq.index') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
