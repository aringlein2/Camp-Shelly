{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit ride{% else %}Add ride{% endif %}</h1>
<form method="post" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Type *</span>
    <select name="type" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      <option value=""></option>
      <option value="offering" {% if item and item['type'] == 'offering' %}selected{% endif %}>I'm driving / offering a ride</option>
      <option value="looking" {% if item and item['type'] == 'looking' %}selected{% endif %}>I'm looking for a ride</option>
    </select>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Leaving from</span>
    <input name="leaving_from" value="{{ item['leaving_from'] if item else '' }}"
           placeholder="e.g. Madison north side"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <div class="grid sm:grid-cols-2 gap-3">
    <label class="block">
      <span class="text-sm font-medium">Departure date/time</span>
      <input name="departure_datetime" value="{{ item['departure_datetime'] if item else '' }}"
             placeholder="Friday around 2pm"
             class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm font-medium">Return date/time</span>
      <input name="return_datetime" value="{{ item['return_datetime'] if item else '' }}"
             placeholder="Sunday late afternoon"
             class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
    </label>
  </div>
  <div class="grid sm:grid-cols-2 gap-3">
    <label class="block">
      <span class="text-sm font-medium">Seats available</span>
      <input name="seats_available" value="{{ item['seats_available'] if item else '' }}"
             class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
    </label>
    <label class="block">
      <span class="text-sm font-medium">Space for gear</span>
      <input name="gear_space" value="{{ item['gear_space'] if item else '' }}"
             placeholder="some / a lot / minimal"
             class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
    </label>
  </div>
  <label class="block">
    <span class="text-sm font-medium">Contact preference (optional)</span>
    <input name="contact_preference" value="{{ item['contact_preference'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm font-medium">Notes</span>
    <textarea name="notes" rows="3" class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['notes'] if item else '' }}</textarea>
  </label>
  {% if item %}
  <label class="block">
    <span class="text-sm font-medium">Status</span>
    <select name="status" class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      {% for s in statuses %}<option value="{{ s }}" {% if item['status'] == s %}selected{% endif %}>{{ s|capitalize }}</option>{% endfor %}
    </select>
  </label>
  {% endif %}
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('rides.index') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
