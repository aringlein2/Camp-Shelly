{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold">{% if item %}Edit item{% else %}New lost / found item{% endif %}</h1>
<form method="post" class="mt-4 space-y-3 bg-white p-4 rounded-xl shadow">
  <label class="block">
    <span class="text-sm font-medium">Type *</span>
    <select name="type" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      <option value=""></option>
      <option value="found" {% if item and item['type'] == 'found' %}selected{% endif %}>I found something</option>
      <option value="missing" {% if item and item['type'] == 'missing' %}selected{% endif %}>I'm missing something</option>
    </select>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Description *</span>
    <textarea name="description" rows="3" required class="mt-1 w-full border border-stone-300 rounded px-3 py-2">{{ item['description'] if item else '' }}</textarea>
  </label>
  <label class="block">
    <span class="text-sm font-medium">Contact preference (optional)</span>
    <input name="contact_preference" value="{{ item['contact_preference'] if item else '' }}"
           class="mt-1 w-full border border-stone-300 rounded px-3 py-2">
  </label>
  {% if item %}
  <label class="block">
    <span class="text-sm font-medium">Status</span>
    <select name="status" class="mt-1 w-full border border-stone-300 rounded px-3 py-2 bg-white">
      {% for s in statuses %}<option value="{{ s }}" {% if item['status'] == s %}selected{% endif %}>{{ s|capitalize }}</option>{% endfor %}
    </select>
  </label>
  {% endif %}
  <div class="flex gap-2">
    <button class="bg-emerald-700 text-white px-4 py-2 rounded">Save</button>
    <a href="{{ url_for('lost_found.index') }}" class="px-4 py-2">Cancel</a>
  </div>
</form>
{% endblock %}
